    <style>
        /* CSS Variables for Dual Atmosphere */
        :root {
            --bg: #f3efe7;
            --text: #1a1a1a;
            --muted: rgba(0, 0, 0, 0.4);
            --line: rgba(0, 0, 0, 0.08);
        }

        body.dark {
            --bg: #0d0f14;
            --text: #e6e6e6;
            --muted: rgba(255, 255, 255, 0.4);
            --line: rgba(255, 255, 255, 0.08);
            background: #0d0f14;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        ::selection {
            background: rgba(255, 255, 255, 0.15);
        }

        ::-webkit-selection {
            background: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 80px 40px 120px 40px;
            letter-spacing: 0.08em;
            transition: background 0.5s ease, color 0.5s ease, opacity 0.4s ease;
        }

        .active {
            opacity: 1 !important;
        }

        body.fade-out {
            opacity: 0;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
            opacity: 0;
            /* Killed in light mode for ultra-clean surface */
            pointer-events: none;
            mix-blend-mode: normal;
            transition: opacity 0.5s ease;
        }

        body.dark::after {
            opacity: 0.06;
            /* Subtle texture only in dark mode */
            mix-blend-mode: overlay;
        }

        /* CENTER MAIN CONTAINER */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            transition: max-width 0.3s ease;
        }

        .toggle {
            position: fixed;
            top: 40px;
            right: 40px;
            font-size: 12px;
            opacity: 0.4;
            cursor: pointer;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 100;
        }

        .toggle:hover {
            opacity: 0.8;
        }

        /* CENTER TOP SECTION */
        .top-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 70px;
            transition: all 0.3s ease;
        }

        .name {
            text-align: center;
            margin-bottom: 20px;
            font-size: 15px;
            opacity: 0.5;
            letter-spacing: 0.25em;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.15s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        .name:hover {
            opacity: 0.8;
        }

        /* SEARCH — APPLE STYLE CENTERED */
        .search-wrap {
            display: flex;
            justify-content: center;
        }

        #searchInput {
            width: 260px;
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 13px;
            letter-spacing: 0.08em;
            color: var(--text);
            outline: none;
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
        }

        #searchInput:focus {
            width: 320px;
            opacity: 1;
            background: rgba(0, 0, 0, 0.06);
            border-color: var(--text);
        }

        #searchInput::placeholder {
            opacity: 0.35;
        }

        body.dark #searchInput {
            background: rgba(255, 255, 255, 0.04);
        }

        body.dark #searchInput:focus {
            background: rgba(255, 255, 255, 0.06);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 60px;
            animation: float 8s ease-in-out infinite;
            transition: filter 0.3s ease;
            /* Smooth background blur fade */
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-2px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .link-item {
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(10px);
            animation: reveal 0.6s ease forwards;
            margin-top: 10px;
            align-items: flex-start;
            text-align: left;
        }

        .link-item:nth-child(1) {
            animation-delay: 0.1s;
        }

        .link-item:nth-child(2) {
            animation-delay: 0.2s;
        }

        .link-item:nth-child(3) {
            animation-delay: 0.3s;
        }

        .link-item:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-item>a {
            text-decoration: none;
            color: var(--text);
            font-size: 22px;
            opacity: 0.75;
            transition: all 0.4s ease;
            position: relative;
            width: fit-content;
        }

        .link-item>a:hover {
            opacity: 1;
            transform: translateX(6px);
        }

        a:active {
            transform: scale(0.96);
            opacity: 0.6;
        }

        .section-heading {
            font-size: 13px;
            opacity: 0.4;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 20px;
            cursor: default;
        }

        .icon-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-left: 4px;
            align-items: flex-start;
        }

        .icon-list>a,
        .hover-dropdown>a {
            font-size: 17.5px;
            opacity: 0.75;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            display: flex;
            align-items: baseline;
            gap: 10px;
            width: fit-content;
        }

        .icon-list>a svg,
        .hover-dropdown>a svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
            opacity: 0.5;
            /* updated to 0.5 to soften brand clashes */
            display: inline-block;
            transition: all 0.3s ease;
            transform: translateY(1px);
        }

        .icon-list>a:hover,
        .hover-dropdown>a:hover {
            opacity: 1;
            transform: translateX(6px);
        }

        .icon-list>a:hover svg,
        .hover-dropdown>a:hover svg {
            opacity: 0.9;
            transform: scale(1.1) translateY(1px);
        }

        .hover-dropdown {
            display: flex;
            flex-direction: column;
            width: fit-content;
        }

        .sub-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-left: 24px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sub-menu.open {
            max-height: 100px;
            opacity: 1;
            margin-top: 10px;
            margin-bottom: 2px;
        }

        .sub-menu a {
            font-size: 15px;
            opacity: 0.65;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }

        .sub-menu a::before {
            content: "•";
            font-size: 14px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .sub-menu a:hover {
            opacity: 1;
            transform: translateX(6px);
        }

        .sub-menu a:hover::before {
            opacity: 0.8;
            transform: scale(1.2);
        }

        /* Email Row & Color Fix */
        .email-row {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .email-link {
            color: var(--text);
            text-decoration: none;
            opacity: 0.75;
            transition: all 0.3s ease;
        }

        .email-link:visited {
            color: var(--text);
        }

        .email-link:hover {
            opacity: 1;
            transform: translateX(6px);
        }

        .copy-btn {
            font-size: 13px;
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
            color: var(--text);
            transform: translateY(-1px);
        }

        .email-row:hover .copy-btn {
            opacity: 0.5;
        }

        .copy-btn:hover {
            opacity: 1 !important;
            transform: scale(1.1) translateY(-1px);
        }

        /* Dynamic Shortcut Overlay */
        .shortcut-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 999;
        }

        body.dark .shortcut-overlay {
            background: rgba(0, 0, 0, 0.4);
        }

        .shortcut-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .shortcut-box {
            background: var(--bg);
            border: 1px solid var(--line);
            padding: 40px;
            border-radius: 2px;
            min-width: 280px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        body.dark .shortcut-box {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .shortcut-title {
            font-size: 12px;
            opacity: 0.4;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 15px;
            margin-bottom: 12px;
            opacity: 0.75;
            color: var(--text);
        }

        .shortcut-item span {
            background: var(--line);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Inter', monospace;
            font-size: 12px;
            min-width: 24px;
            text-align: center;
            font-weight: 500;
        }

        /* Hidden Message Overlay - Global Base (Desktop) */
        .message-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            /* Base state */
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            opacity: 0;
            pointer-events: none;
            transition:
                opacity 0.25s ease,
                backdrop-filter 0.4s ease,
                -webkit-backdrop-filter 0.4s ease,
                background 0.3s ease;
            z-index: 999;
        }

        .message-overlay.active {
            opacity: 1;
            pointer-events: auto;
            backdrop-filter: blur(8px) saturate(110%);
            -webkit-backdrop-filter: blur(8px) saturate(110%);
            background: rgba(0, 0, 0, 0.08);
            /* very light dim */
        }

        .message-box {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 26px;
            padding: 34px 38px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
            transform: translateY(10px) scale(0.94);
            opacity: 0;
            transition:
                transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.25s ease;
        }

        body.dark .message-box {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .message-overlay.active .message-box {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.9;
            letter-spacing: 0.06em;
            opacity: 0.85;
        }

        .highlight {
            color: #ff453a;
            font-style: italic;
            display: inline-block;
            margin-top: 4px;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.4s ease;
        }

        .message-overlay.active .highlight {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.15s;
        }

        /* DESKTOP HORIZONTAL SECTIONS - EDITORIAL LAYOUT */
        @media (min-width: 900px) {
            .links {
                display: grid;
                grid-template-columns: repeat(4, 220px);
                justify-content: center;
                gap: 120px;
                align-items: flex-start;
            }
        }

        /* MOBILE ENHANCEMENTS: Scroll Fade, Sticky Top, Breathing Space */
        @media (max-width: 600px) {
            body {
                padding: 50px 20px 100px 20px;
                letter-spacing: 0.06em;
            }

            .container {
                max-width: 320px;
            }

            .top-center {
                align-items: flex-start;
                margin-bottom: 0;
                position: static;
                background: none;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                padding: 0;
            }

            .search-wrap {
                display: none !important;
            }

            .name {
                text-align: left;
                margin-bottom: 50px;
                font-size: 13px;
            }

            .links {
                gap: 40px;
            }

            .link-item:first-child {
                margin-top: 10px;
            }

            .section-heading {
                text-align: left;
                margin-bottom: 12px;
                font-size: 12px;
                opacity: 0.4;
            }

            .icon-list {
                gap: 14px;
                margin-left: 2px;
            }

            .icon-list>a,
            .hover-dropdown>a {
                justify-content: flex-start;
                font-size: 16px;
            }

            .copy-btn {
                opacity: 0.5;
            }

            .sub-menu {
                margin-left: 18px;
            }

            .toggle {
                top: 20px;
                right: 20px;
                font-size: 11px;
            }

            /* --- MOBILE MESSAGE OVERLAY TWEAKS --- */
            .message-overlay {
                padding: 20px;
            }

            .message-overlay.active {
                background: rgba(0, 0, 0, 0.08);
                /* same as desktop */
                backdrop-filter: blur(8px) saturate(110%);
                -webkit-backdrop-filter: blur(8px) saturate(110%);
            }

            /* Make box more solid on mobile */
            .message-box {
                padding: 26px 22px;
                border-radius: 18px;
                background: rgba(255, 255, 255, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.6);
            }

            /* Dark mode mobile */
            body.dark .message-box {
                background: rgba(20, 20, 20, 0.9);
                border: 1px solid rgba(255, 255, 255, 0.12);
            }
        }
    </style>
</head>

    <script>
        const modeToggle = document.getElementById("modeToggle");

        // PERSISTENCE LOGIC
        if (localStorage.getItem("mode") === "dark") {
            document.body.classList.add("dark");
            modeToggle.innerText = "day";
        } else if (localStorage.getItem("mode") === "light") {
            document.body.classList.remove("dark");
            modeToggle.innerText = "night";
        } else {
            const hour = new Date().getHours();
            if (hour >= 18 || hour <= 5) {
                document.body.classList.add("dark");
                modeToggle.innerText = "day";
            }
        }

        function toggleMode() {
            document.body.classList.toggle("dark");
            if (document.body.classList.contains("dark")) {
                localStorage.setItem("mode", "dark");
                modeToggle.innerText = "day";
            } else {
                localStorage.setItem("mode", "light");
                modeToggle.innerText = "night";
            }
        }

        // Active Link Highlighting
        const currentPath = window.location.pathname.split("/").pop();
        document.querySelectorAll("a").forEach(link => {
            const linkHref = link.getAttribute("href");
            if (linkHref === currentPath && linkHref !== "#") {
                link.classList.add("active");
            }
        });

        // Unified Dropdown Toggle (Desktop & Mobile)
        document.querySelectorAll(".hover-dropdown > a").forEach(link => {
            link.addEventListener("click", function (e) {
                e.preventDefault();
                const menu = this.nextElementSibling;
                document.querySelectorAll(".sub-menu").forEach(m => {
                    if (m !== menu) m.classList.remove("open");
                });
                menu.classList.toggle("open");
            });
        });

        // Copy Email Logic
        document.querySelectorAll(".copy-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const email = btn.dataset.email;
                navigator.clipboard.writeText(email);

                const originalText = btn.innerText;
                btn.innerText = "✓";
                setTimeout(() => {
                    btn.innerText = originalText;
                }, 1000);
            });
        });

        // Universal Close for Dropdowns & Menus
        document.addEventListener("click", function (e) {
            document.querySelectorAll(".sub-menu").forEach(menu => {
                const parent = menu.parentElement;
                if (!parent.contains(e.target)) {
                    menu.classList.remove("open");
                }
            });
        });

        // Fade-out transition
        document.querySelectorAll("a").forEach(link => {
            link.addEventListener("click", function (e) {
                const href = this.getAttribute("href");
                if (href && href !== "#" && !href.startsWith("http") && !href.startsWith("mailto")) {
                    if (this.parentElement.classList.contains("hover-dropdown") && window.innerWidth <= 600) {
                        return;
                    }
                    e.preventDefault();
                    document.body.classList.add("fade-out");
                    setTimeout(() => { window.location.href = href; }, 400);
                }
            });
        });

        // Tactile Micro-Sound
        const sound = document.getElementById("hoverSound");
        document.querySelectorAll("a").forEach(link => {
            ['mouseenter', 'touchstart'].forEach(evt => {
                link.addEventListener(evt, () => {
                    sound.volume = 0.05;
                    sound.currentTime = 0;
                    sound.play().catch(() => { });
                }, { passive: true });
            });
        });

        // Subtle Parallax (Mobile Only)
        window.addEventListener("scroll", () => {
            if (window.innerWidth > 600) return;
            const y = window.scrollY * 0.08;
            document.body.style.backgroundPosition = `center ${y}px`;
        });

        // Inline Search & Filter Logic
        const searchWrap = document.querySelector(".search-wrap");
        const searchInput = document.getElementById("searchInput");
        const filterableLinks = document.querySelectorAll(".icon-list a:not(.sub-menu a)");

        if (searchInput) {
            searchInput.addEventListener("input", () => {
                const value = searchInput.value.toLowerCase();
                filterableLinks.forEach(link => {
                    const text = link.innerText.toLowerCase();
                    if (text.includes(value)) {
                        link.style.display = "flex";
                    } else {
                        link.style.display = "none";
                    }
                });
            });

            searchInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    const visible = [...filterableLinks].find(link => link.style.display !== "none");
                    if (visible) {
                        window.open(visible.href, "_blank");
                    }
                }
            });
        }

        // Auto-Generate Shortcuts
        const shortcutOverlay = document.getElementById("shortcutOverlay");
        const shortcutList = document.getElementById("shortcutList");
        const allLinksForShortcuts = Array.from(document.querySelectorAll(".icon-list a:not(.email-link)"));

        const shortcutMap = {};
        allLinksForShortcuts.forEach((link, index) => {
            const label = link.innerText.trim().toLowerCase();
            if (!label) return;
            let key = label[0];
            if (shortcutMap[key]) {
                key = (index + 1).toString();
            }
            shortcutMap[key] = link.href;
            const item = document.createElement("div");
            item.className = "shortcut-item";
            item.innerHTML = `<span>${key}</span> ${label}`;
            shortcutList.appendChild(item);
        });

        // Extend Keyboard Logic
        document.addEventListener("keydown", function (e) {
            const key = e.key.toLowerCase();
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
            if (key === "/" && window.innerWidth > 600 && searchInput) {
                e.preventDefault();
                searchInput.focus();
                return;
            }
            if (key === "?") {
                e.preventDefault();
                shortcutOverlay.classList.add("active");
                return;
            }
            if (key === "escape") {
                document.getElementById("shortcutOverlay").classList.remove("active");
                document.getElementById("messageOverlay").classList.remove("active");
                document.body.classList.remove("modal-open");
                return;
            }
            if (shortcutMap[key]) {
                window.open(shortcutMap[key], "_blank");
            }
        });

        shortcutOverlay.addEventListener("click", function (e) {
            if (e.target === shortcutOverlay) {
                shortcutOverlay.classList.remove("active");
            }
        });

        // UNIVERSAL TAP / CLICK (works everywhere)
        const messageOverlay = document.getElementById("messageOverlay");
        const nameEl = document.querySelector(".name");

        nameEl.addEventListener("click", () => {
            nameEl.style.transform = "scale(0.96)";
            if (navigator.vibrate) navigator.vibrate(40); // kept a tiny tactile click feel
            setTimeout(() => {
                nameEl.style.transform = "";
                document.body.classList.add("modal-open");
                messageOverlay.classList.add("active");
            }, 100);
        });

        messageOverlay.addEventListener("click", (e) => {
            if (e.target === messageOverlay) {
                messageOverlay.classList.remove("active");
                document.body.classList.remove("modal-open");
            }
        });
    </script>
