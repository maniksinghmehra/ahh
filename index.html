<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Dual Atmosphere */
        :root {
            --bg: #f3efe7;
            --text: #1a1a1a;
            --muted: rgba(0, 0, 0, 0.4);
            --line: rgba(0, 0, 0, 0.08);
        }

        body.dark {
            --bg: #0d0f14;
            --text: #e6e6e6;
            --muted: rgba(255, 255, 255, 0.4);
            --line: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 80px 40px 120px 40px;
            letter-spacing: 0.08em;
            transition: background 0.5s ease, color 0.5s ease, opacity 0.4s ease;
        }

        .active {
            opacity: 1 !important;
        }

        body.fade-out {
            opacity: 0;
        }

        body.dark {
            background: radial-gradient(circle at 70% 20%,
                    rgba(255, 255, 255, 0.04),
                    transparent 40%),
                #0d0f14;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
            opacity: 0.12;
            pointer-events: none;
            mix-blend-mode: multiply;
            transition: opacity 0.5s ease;
        }

        body.dark::after {
            opacity: 0.25;
            mix-blend-mode: overlay;
        }

        .container {
            max-width: 520px;
            width: 100%;
        }

        .toggle {
            position: fixed;
            top: 40px;
            right: 40px;
            font-size: 12px;
            opacity: 0.4;
            cursor: pointer;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 100;
        }

        .toggle:hover {
            opacity: 0.8;
        }

        .name {
            font-size: 15px;
            opacity: 0.5;
            margin-bottom: 70px;
            letter-spacing: 0.25em;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 48px;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-2px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .link-item {
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(10px);
            animation: reveal 0.6s ease forwards;
            margin-top: 6px;
        }

        .link-item:nth-child(1) {
            animation-delay: 0.1s;
        }

        .link-item:nth-child(2) {
            animation-delay: 0.2s;
        }

        .link-item:nth-child(3) {
            animation-delay: 0.3s;
        }

        .link-item:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-item>a {
            text-decoration: none;
            color: var(--text);
            font-size: 22px;
            opacity: 0.75;
            transition: all 0.4s ease;
            position: relative;
            width: fit-content;
        }

        .link-item>a:hover {
            opacity: 1;
            transform: translateX(6px);
        }

        .section-heading {
            font-size: 13px;
            opacity: 0.4;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 14px;
            cursor: default;
        }

        .icon-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-left: 4px;
        }

        .link-item .icon-list:has(a:only-child) {
            gap: 0;
        }

        .icon-list>a,
        .hover-dropdown>a {
            font-size: 17.5px;
            opacity: 0.75;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            display: flex;
            align-items: baseline;
            gap: 8px;
            width: fit-content;
        }

        .link-item .icon-list a:only-child {
            font-size: 16.5px;
        }

        .icon-list>a svg,
        .hover-dropdown>a svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
            opacity: 0.35;
            transition: all 0.3s ease;
            transform: translateY(-0.5px);
        }

        .icon-list>a:hover,
        .hover-dropdown>a:hover {
            opacity: 1;
            transform: translateX(6px);
        }

        .icon-list>a:hover svg,
        .hover-dropdown>a:hover svg {
            opacity: 0.9;
            transform: scale(1.1) translateY(-0.5px);
        }

        .hover-dropdown {
            display: flex;
            flex-direction: column;
            width: fit-content;
        }

        .sub-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-left: 24px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .hover-dropdown:hover .sub-menu {
            max-height: 100px;
            opacity: 1;
            margin-top: 10px;
            margin-bottom: 2px;
        }

        /* Mobile tap toggle state */
        .sub-menu.open {
            max-height: 100px;
            opacity: 1;
            margin-top: 8px;
            margin-bottom: 2px;
        }

        .sub-menu a {
            font-size: 15px;
            opacity: 0.65;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }

        .sub-menu a::before {
            content: "•";
            font-size: 14px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .sub-menu a:hover {
            opacity: 1;
            transform: translateX(6px);
        }

        .sub-menu a:hover::before {
            opacity: 0.8;
            transform: scale(1.2);
        }

        /* NARROW EDITORIAL STRIP FOR MOBILE */
        @media (max-width: 600px) {
            body {
                padding: 50px 20px 100px 20px;
                letter-spacing: 0.06em;
            }

            .container {
                max-width: 320px;
            }

            .name {
                font-size: 13px;
                margin-bottom: 50px;
                text-align: left;
            }

            .links {
                gap: 40px;
            }

            .link-item {
                align-items: flex-start;
            }

            .section-heading {
                text-align: left;
                margin-bottom: 12px;
                font-size: 12px;
                opacity: 0.4;
            }

            .icon-list {
                align-items: flex-start;
                gap: 14px;
                margin-left: 2px;
            }

            .icon-list>a,
            .hover-dropdown>a {
                justify-content: flex-start;
                font-size: 16px;
            }

            .sub-menu {
                margin-left: 18px;
            }

            .toggle {
                top: 20px;
                right: 20px;
                font-size: 11px;
            }
        }
    </style>
</head>

    <script>
        const modeToggle = document.getElementById("modeToggle");

        // PERSISTENCE LOGIC
        if (localStorage.getItem("mode") === "dark") {
            document.body.classList.add("dark");
            modeToggle.innerText = "day";
        } else if (localStorage.getItem("mode") === "light") {
            document.body.classList.remove("dark");
            modeToggle.innerText = "night";
        } else {
            const hour = new Date().getHours();
            if (hour >= 18 || hour <= 5) {
                document.body.classList.add("dark");
                modeToggle.innerText = "day";
            }
        }

        function toggleMode() {
            document.body.classList.toggle("dark");
            if (document.body.classList.contains("dark")) {
                localStorage.setItem("mode", "dark");
                modeToggle.innerText = "day";
            } else {
                localStorage.setItem("mode", "light");
                modeToggle.innerText = "night";
            }
        }

        // Active Link Highlighting
        const currentPath = window.location.pathname.split("/").pop();
        document.querySelectorAll("a").forEach(link => {
            const linkHref = link.getAttribute("href");
            if (linkHref === currentPath && linkHref !== "#") {
                link.classList.add("active");
            }
        });

        // Mobile Dropdown Toggle
        document.querySelectorAll(".hover-dropdown > a").forEach(link => {
            link.addEventListener("click", function (e) {
                if (window.innerWidth <= 600) {
                    e.preventDefault();
                    const menu = this.nextElementSibling;
                    menu.classList.toggle("open");
                }
            });
        });

        // Fade-out transition
        document.querySelectorAll("a").forEach(link => {
            link.addEventListener("click", function (e) {
                const href = this.getAttribute("href");
                if (href && href !== "#" && !href.startsWith("http") && !href.startsWith("mailto")) {
                    // Don't fade out if it's just toggling the mobile menu
                    if (this.parentElement.classList.contains("hover-dropdown") && window.innerWidth <= 600) {
                        return;
                    }
                    e.preventDefault();
                    document.body.classList.add("fade-out");
                    setTimeout(() => { window.location.href = href; }, 400);
                }
            });
        });

        // Tactile Micro-Sound
        const sound = document.getElementById("hoverSound");
        document.querySelectorAll("a").forEach(link => {
            ['mouseenter', 'touchstart'].forEach(evt => {
                link.addEventListener(evt, () => {
                    sound.volume = 0.05;
                    sound.currentTime = 0;
                    sound.play().catch(() => { });
                }, { passive: true });
            });
        });
    </script>
